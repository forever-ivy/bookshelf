<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧书架 · 家庭阅读助手</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="wake-overlay" class="wake-overlay hidden">
  <div class="wake-ring"></div>
  <div class="wake-ring wake-ring-2"></div>
  <span class="wake-label"><i class="fa-solid fa-microphone"></i> 正在聆听...</span>
</div>

<div class="app-container">
  <aside class="sidebar">
    <div class="brand-header">
      <div class="brand-icon"><i class="fa-solid fa-book-open-reader"></i></div>
      <div class="brand-text">
        <h1>智慧书架</h1>
        <span class="brand-sub">家庭图书收纳与借阅助手</span>
      </div>
    </div>

    <div class="panel-card user-panel">
      <div class="current-user-row">
        <div id="current-avatar" class="user-avatar-lg">书</div>
        <div class="current-user-info">
          <div id="current-name" class="current-user-name">当前成员</div>
          <div id="current-role" class="current-user-role">-</div>
        </div>
        <button id="btn-manage-users" class="btn-text-sm" title="成员管理">
          <i class="fa-solid fa-gear"></i>
        </button>
      </div>
      <div id="user-switcher" class="user-switcher"></div>
    </div>

    <div class="panel-card action-panel">
      <button id="btn-store" class="btn-primary btn-block btn-lg">
        <i class="fa-solid fa-camera"></i>
        <span>拍照存书</span>
      </button>
      <div class="divider-line"></div>
      <div class="search-sectionbox">
        <label for="search_input"><i class="fa-solid fa-magnifying-glass"></i> 搜索书名并取出</label>
        <div class="input-group">
          <input id="search_input" type="text" placeholder="输入书名关键词..." class="input-field">
          <button id="btn-search" class="btn-secondary">搜索</button>
        </div>
      </div>
    </div>

    <div class="panel-card stats-panel">
      <div class="panel-title">
        <h3><i class="fa-solid fa-chart-simple"></i> 书架统计</h3>
        <button id="btn-stats-detail" class="btn-text-sm">查看详情</button>
      </div>
      <div class="stats-visual">
        <div class="stat-ring-wrap">
          <svg class="stat-ring" viewBox="0 0 80 80">
            <circle class="ring-bg" cx="40" cy="40" r="30"/>
            <circle id="ring-fill" class="ring-fill" cx="40" cy="40" r="30"
                    stroke-dasharray="0 188.5" stroke-dashoffset="47"/>
          </svg>
          <div class="ring-center">
            <span id="ring-pct">0%</span>
            <span class="ring-label">使用率</span>
          </div>
        </div>
        <div class="stat-numbers">
          <div class="stat-row"><span class="stat-dot dot-total"></span><span class="stat-name">总格数</span><span id="stat-total" class="stat-val">-</span></div>
          <div class="stat-row"><span class="stat-dot dot-used"></span><span class="stat-name">已存书</span><span id="stat-used" class="stat-val">-</span></div>
          <div class="stat-row"><span class="stat-dot dot-free"></span><span class="stat-name">空闲格</span><span id="stat-free" class="stat-val">-</span></div>
        </div>
      </div>
    </div>

    <div class="panel-card log-panel">
      <div class="panel-title">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> 操作记录</h3>
      </div>
      <div class="log-list-container">
        <ul id="log_box" class="log-list"></ul>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="main-header">
      <div class="header-left">
        <h2>书架总览</h2>
        <div id="stats_bar" class="stats-pills"></div>
      </div>
      <div class="header-right">
        <span class="shelf-hint"><i class="fa-regular fa-hand-pointer"></i> 点击已占用格可取出图书</span>
      </div>
    </header>
    <div class="shelf-container scrollbar-styled">
      <div id="shelf_grid" class="shelf-grid"></div>
    </div>
  </main>

  <aside class="assistant-panel">
    <div class="panel-card assistant-identity">
      <div class="assistant-avatar">
        <i class="fa-solid fa-robot"></i>
        <div class="avatar-ping"></div>
      </div>
      <div class="assistant-info">
        <div class="assistant-name">小燕</div>
        <div class="assistant-desc">你的家庭图书小管家</div>
      </div>
    </div>

    <div class="panel-card chat-card">
      <div class="panel-title">
        <h3><i class="fa-regular fa-comments"></i> 聊天与语音</h3>
      </div>
      <div class="chat-box-container scrollbar-styled">
        <div id="chat_box" class="chat-messages"></div>
      </div>
      <div class="chat-input-area">
        <div class="input-group chat-text-group">
          <input id="chat_input" type="text" placeholder="和小燕聊聊..." class="input-field">
          <button id="btn-send-text" class="btn-icon">
            <i class="fa-regular fa-paper-plane"></i>
          </button>
        </div>
        <div class="voice-hint">
          <button id="btn-mic" class="btn-mic-main btn-block">
            <i class="fa-solid fa-microphone-slash"></i>
            <span>开启语音助手</span>
          </button>
          <div id="mic-wave" class="mic-wave hidden">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div id="mic-status" class="mic-status-text">点击按钮开始语音唤醒</div>
          <div id="wake-indicator" class="wake-indicator hidden">
            <i class="fa-solid fa-circle-dot"></i> 已进入唤醒模式
          </div>
        </div>
      </div>
    </div>
  </aside>
</div>

<!-- 成员管理弹窗 -->
<div id="user-modal" class="modal-overlay hidden">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h2><i class="fa-solid fa-users"></i> 成员管理</h2>
      <button id="btn-close-user-modal" class="btn-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div id="user-list-manage" class="user-list-manage"></div>
      <div class="divider-line"></div>
      <div class="add-user-form">
        <h4 style="margin-bottom:10px;font-size:14px;color:var(--text-2)"><i class="fa-solid fa-plus"></i> 新增成员</h4>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <input id="new-user-avatar" type="text" class="input-field" placeholder="头像" style="width:52px;flex:none;text-align:center;">
          <input id="new-user-name" type="text" class="input-field" placeholder="姓名">
          <select id="new-user-role" class="input-field" style="flex:none;width:72px;">
            <option value="parent">家长</option>
            <option value="child">孩子</option>
          </select>
        </div>
        <div style="margin-bottom:10px;">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">选择主题风格</div>
          <div class="theme-picker-grid">
            <button class="theme-option active" data-theme="warm" title="家庭温馨"
                    style="--preview: linear-gradient(135deg, #8b5e3c 0%, #f3d3b0 50%, #c9d3a4 100%);">
              <span class="theme-preview"></span>
              <span class="theme-meta">
                <span class="theme-name">家庭温馨</span>
                <span class="theme-desc">暖木奶油 · 柔和灯光</span>
              </span>
            </button>
            <button class="theme-option" data-theme="slate" title="科技炫酷"
                    style="--preview: linear-gradient(135deg, #0f172a 0%, #28d7ff 55%, #8b5cff 100%);">
              <span class="theme-preview"></span>
              <span class="theme-meta">
                <span class="theme-name">科技炫酷</span>
                <span class="theme-desc">霓虹蓝紫 · 未来感</span>
              </span>
            </button>
            <button class="theme-option" data-theme="rose" title="粉嫩甜心"
                    style="--preview: linear-gradient(135deg, #ff7aa2 0%, #ffc1d6 60%, #ffdce8 100%);">
              <span class="theme-preview"></span>
              <span class="theme-meta">
                <span class="theme-name">粉嫩甜心</span>
                <span class="theme-desc">棉花糖 · 轻柔粉</span>
              </span>
            </button>
            <button class="theme-option" data-theme="forest" title="森林清新"
                    style="--preview: linear-gradient(135deg, #2f5b3d 0%, #78a082 60%, #cfe6d7 100%);">
              <span class="theme-preview"></span>
              <span class="theme-meta">
                <span class="theme-name">森林清新</span>
                <span class="theme-desc">草木气息 · 清爽绿</span>
              </span>
            </button>
            <button class="theme-option" data-theme="ocean" title="海洋清爽"
                    style="--preview: linear-gradient(135deg, #1e4f7a 0%, #56a7c2 60%, #d8eef7 100%);">
              <span class="theme-preview"></span>
              <span class="theme-meta">
                <span class="theme-name">海洋清爽</span>
                <span class="theme-desc">海风蓝 · 清透感</span>
              </span>
            </button>
            <button class="theme-option" data-theme="golden" title="日落暖橙"
                    style="--preview: linear-gradient(135deg, #f28c28 0%, #ffb703 60%, #ffe6b0 100%);">
              <span class="theme-preview"></span>
              <span class="theme-meta">
                <span class="theme-name">日落暖橙</span>
                <span class="theme-desc">暖阳 · 活力橙</span>
              </span>
            </button>
          </div>
        </div>
        <button id="btn-add-user" class="btn-primary btn-block" style="font-size:14px;padding:10px;">
          <i class="fa-solid fa-plus"></i> 添加成员
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 统计详情弹窗 -->
<div id="stats-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h2><i class="fa-solid fa-chart-line"></i> 书架统计详情</h2>
      <button id="btn-close-modal" class="btn-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="report-grid">
        <div class="report-card rc-blue"><div class="rc-icon"><i class="fa-solid fa-boxes-stacked"></i></div><div class="rc-num" id="rpt-total">-</div><div class="rc-label">总格数</div></div>
        <div class="report-card rc-green"><div class="rc-icon"><i class="fa-solid fa-book"></i></div><div class="rc-num" id="rpt-used">-</div><div class="rc-label">已存书</div></div>
        <div class="report-card rc-amber"><div class="rc-icon"><i class="fa-solid fa-percent"></i></div><div class="rc-num" id="rpt-pct">-</div><div class="rc-label">使用率</div></div>
        <div class="report-card rc-rose"><div class="rc-icon"><i class="fa-solid fa-star"></i></div><div class="rc-num" id="rpt-ops">-</div><div class="rc-label">今日操作</div></div>
      </div>
      <div class="report-section">
        <h4><i class="fa-solid fa-list-ul"></i> 已存书列表</h4>
        <div id="rpt-booklist" class="book-list-report"></div>
      </div>
      <div class="report-section">
        <h4><i class="fa-solid fa-robot"></i> 智能建议</h4>
        <div id="rpt-insight" class="insight-box">加载中...</div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
