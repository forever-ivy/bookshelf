<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ cabinet.cabinet_name or '智慧书架' }} · 书柜绑定</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #faf5ed 0%, #f3eadc 100%);
      color: #3f2f1f;
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
    }

    .card {
      width: min(520px, calc(100% - 32px));
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 252, 246, 0.9);
      box-shadow: 0 18px 50px rgba(86, 60, 32, 0.12);
      border: 1px solid rgba(118, 87, 52, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.7;
      color: #715c47;
    }

    .code {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: white;
      text-align: center;
      font-size: 22px;
      letter-spacing: 0.18em;
      color: #a96b38;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>请回到 App 完成绑定</h1>
    <p>{{ cabinet.cabinet_name or "智慧书架" }} 的配对链接已经准备好。</p>
    <p>如果你是在手机浏览器里打开了这个页面，请复制下面的配对码，回到 App 的绑定流程继续完成注册或登录。</p>
    <div id="pair-code" class="code">--</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("pair-code").textContent = params.get("pair_code") || "--";
  </script>
</body>
</html>
